  <text x="1000" y="900" fill="#F9FAFB" font-family="Poppins, Arial, sans-serif" font-size="26" font-weight="700">5. Tiny Favicon</text>
  <text x="1000" y="932" fill="#CBD5E1" font-family="Poppins, Arial, sans-serif" font-size="17" font-weight="500">Minimal, crisp, and recognizable at 16-32px.</text>
