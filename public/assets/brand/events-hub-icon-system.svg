  <rect width="1440" height="1080" rx="44" fill="url(#systemBg)"/>
  <text x="88" y="112" fill="#111827" font-family="Poppins, Arial, sans-serif" font-size="48" font-weight="800" letter-spacing="-1.8">Events Hub Icon System</text>
  <text x="88" y="158" fill="#6B7280" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="500">Production-ready event-tech brand mark with location pin, ticket, and check-in confirmation.</text>

  <rect x="88" y="214" width="592" height="360" rx="34" fill="white"/>
  <rect x="760" y="214" width="592" height="360" rx="34" fill="#111827"/>
