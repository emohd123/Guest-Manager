  <rect x="952" y="624" width="400" height="320" rx="34" fill="#111827"/>

  <image href="/assets/brand/events-hub-icon-primary.svg" x="206" y="264" width="356" height="356"/>
  <text x="120" y="540" fill="#111827" font-family="Poppins, Arial, sans-serif" font-size="30" font-weight="700">1. Primary Standalone Icon</text>
  <text x="120" y="578" fill="#6B7280" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="500">Transparent background, glossy gradient, soft glow, and depth.</text>

  <image href="/assets/brand/events-hub-icon-primary.svg" x="878" y="264" width="356" height="356"/>
  <text x="792" y="540" fill="#F9FAFB" font-family="Poppins, Arial, sans-serif" font-size="30" font-weight="700">2. Light and Dark Safe</text>
  <text x="792" y="578" fill="#CBD5E1" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="500">Strong white ticket and bold check for contrast on dark surfaces.</text>

  <image href="/assets/brand/events-hub-icon-flat.svg" x="164" y="680" width="248" height="248"/>
  <text x="124" y="900" fill="#111827" font-family="Poppins, Arial, sans-serif" font-size="26" font-weight="700">3. Flat Icon</text>
  <text x="124" y="932" fill="#6B7280" font-family="Poppins, Arial, sans-serif" font-size="17" font-weight="500">Optimized for small-size UI use.</text>

