  <text x="556" y="900" fill="#111827" font-family="Poppins, Arial, sans-serif" font-size="26" font-weight="700">4. App Tile</text>
  <text x="556" y="932" fill="#6B7280" font-family="Poppins, Arial, sans-serif" font-size="17" font-weight="500">Rounded-square mobile app presentation.</text>

